<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>即时聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--bg:#f0f2f5;--card:#fff;--text:#1e293b;--text-light:#64748b;--bubble-self:#6366f1;--bubble-other:#fff;--border:#e2e8f0;--danger:#ef4444;--success:#22c55e;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.join-panel{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);transition:opacity .4s,visibility .4s}
.join-panel.hidden{opacity:0;visibility:hidden;pointer-events:none}
.join-card{background:#fff;border-radius:20px;padding:36px 28px;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.join-card .logo{text-align:center;font-size:48px;margin-bottom:8px}
.join-card h1{text-align:center;font-size:22px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.join-card .subtitle{text-align:center;font-size:13px;color:var(--text-light);margin-bottom:24px}
.join-card label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.join-card input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border .2s;margin-bottom:14px}
.join-card input:focus{border-color:var(--primary)}
.join-card .btn-join{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:6px}
.join-card .btn-join:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.join-card .btn-join:active{transform:scale(.97)}
.join-card .status-msg{text-align:center;font-size:12px;color:var(--danger);margin-top:12px;min-height:18px}
.main-app{display:flex;flex-direction:column;height:100dvh;opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s}
.main-app.visible{opacity:1;transform:translateY(0)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar .room-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar .room-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.topbar .btn-online{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-light);padding:4px 8px;border-radius:12px;transition:background .15s}
.topbar .btn-online:hover{background:#f1f5f9}
.topbar .btn-online .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.topbar .btn-leave{background:none;border:1.5px solid var(--danger);color:var(--danger);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s}
.topbar .btn-leave:hover{background:var(--danger);color:#fff}
.loc-indicator{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-light)}
.loc-indicator.active{color:var(--success)}
.loc-indicator .loc-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.user-list-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.user-list-overlay.open{opacity:1;visibility:visible}
.user-list-card{background:#fff;border-radius:16px;width:90%;max-width:360px;max-height:75vh;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.2);display:flex;flex-direction:column}
.user-list-card .header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.user-list-card .header h3{font-size:15px}
.user-list-card .header .close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);padding:4px}
.user-list-body{flex:1;overflow-y:auto;padding:8px 0}
.user-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:14px;flex-wrap:wrap}
.user-item .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
.user-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:50px}
.user-item .me-tag{font-size:10px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px}
.user-item .btn-call{width:30px;height:30px;border-radius:50%;border:none;background:#dcfce7;color:#166534;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.user-item .btn-call:hover{transform:scale(1.15)}.user-item .btn-call:active{transform:scale(.9)}
.user-item .loc-info{width:100%;font-size:11px;color:var(--text-light);padding-left:42px;margin-top:-2px;line-height:1.4}
.user-item .loc-info .coords{color:#94a3b8}
.user-item .loc-info .dist{color:var(--primary);font-weight:600;margin-left:8px}
.chat-section{flex:1;display:flex;flex-direction:column;background:var(--card);overflow:hidden;min-height:0}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
.msg-row{display:flex;margin-bottom:10px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.self{justify-content:flex-end}.msg-row.other{justify-content:flex-start}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.msg-row.self .msg-bubble{background:var(--bubble-self);color:#fff;border-bottom-right-radius:4px}
.msg-row.other .msg-bubble{background:var(--bubble-other);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.msg-nickname{font-size:11px;font-weight:600;margin-bottom:3px;color:#a5b4fc}
.msg-row.other .msg-nickname{color:var(--primary)}
.msg-time{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px;text-align:right}
.msg-row.other .msg-time{color:var(--text-light)}
.msg-system{text-align:center;margin-bottom:8px;font-size:12px;color:var(--text-light);animation:msgIn .3s ease}
.msg-image{max-width:200px;border-radius:8px;cursor:pointer;display:block;transition:transform .15s}
.msg-image:hover{transform:scale(1.03)}
.msg-row.self .msg-bubble.image-bubble{background:transparent;padding:0;overflow:hidden;border-radius:12px}
.msg-row.other .msg-bubble.image-bubble{background:transparent;border:none;padding:0;box-shadow:none;overflow:hidden;border-radius:12px}
.msg-video{max-width:200px;max-height:300px;border-radius:8px;display:block}
.msg-row.self .msg-bubble.video-bubble{background:transparent;padding:0;overflow:hidden;border-radius:12px}
.msg-row.other .msg-bubble.video-bubble{background:transparent;border:none;padding:0;box-shadow:none;overflow:hidden;border-radius:12px}
.video-rec-tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(239,68,68,.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;pointer-events:none;z-index:10;white-space:nowrap;animation:pulse-dot 1.5s infinite}
.voice-msg{display:flex;align-items:center;gap:10px;min-width:120px}
.btn-play-voice{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .15s}
.btn-play-voice:hover{transform:scale(1.1)}.btn-play-voice.playing{animation:voice-pulse .8s infinite}
@keyframes voice-pulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 8px transparent}}
.msg-row.self .btn-play-voice{background:rgba(255,255,255,.25);color:#fff}
.msg-row.other .btn-play-voice{background:var(--primary);color:#fff}
.voice-wave{display:flex;align-items:flex-end;gap:2px;height:24px;flex:1}
.voice-wave .bar{width:3px;border-radius:2px;transition:height .15s;opacity:.5}
.msg-row.self .voice-wave .bar{background:#fff}.msg-row.other .voice-wave .bar{background:var(--primary)}
.voice-duration{font-size:12px;opacity:.7;min-width:30px}
.img-viewer{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.img-viewer.open{opacity:1;visibility:visible}
.img-viewer img{max-width:95vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);transform:scale(.9);transition:transform .3s}
.img-viewer.open img{transform:scale(1)}
.img-viewer .btn-close-viewer{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 视频通话 */
.call-overlay{position:fixed;inset:0;z-index:600;background:#1a1a2e;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.call-overlay.open{opacity:1;visibility:visible}
.call-remote-video{flex:1;position:relative;background:#0f0f1a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.call-remote-video video{width:100%;height:100%;object-fit:cover}
.call-remote-video .caller-name{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;padding:6px 16px;border-radius:20px;font-size:15px;pointer-events:none}
.call-remote-video .call-status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:16px;text-align:center;display:none}
.call-remote-video .call-status.show{display:block}
.call-self-video{position:absolute;bottom:100px;right:16px;width:120px;height:170px;border-radius:12px;overflow:hidden;background:#1e1e3a;border:2px solid rgba(255,255,255,.3);box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:2}
.call-self-video video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.call-controls{display:flex;align-items:center;justify-content:center;gap:24px;padding:20px;background:rgba(0,0,0,.8);flex-shrink:0}
.call-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;font-size:24px;transition:transform .15s,background .15s;display:flex;align-items:center;justify-content:center}
.call-btn:hover{transform:scale(1.1)}.call-btn:active{transform:scale(.9)}
.call-btn-hangup{background:#ef4444;color:#fff}
.call-btn-mute{background:rgba(255,255,255,.2);color:#fff}.call-btn-mute.muted{background:#f59e0b}
.call-btn-camera{background:rgba(255,255,255,.2);color:#fff}.call-btn-camera.off{background:#f59e0b}
.call-btn-switch{background:rgba(255,255,255,.2);color:#fff}

/* 来电提示 */
.incoming-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.incoming-overlay.open{opacity:1;visibility:visible}
.incoming-card{background:#fff;border-radius:20px;padding:32px;width:88%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:ringIn .4s ease}
@keyframes ringIn{0%{opacity:0;transform:scale(.85) translateY(20px)}60%{opacity:1;transform:scale(1.03) translateY(0)}100%{transform:scale(1) translateY(0)}}
.incoming-card .caller-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700;margin:0 auto 12px}
.incoming-card .caller-name{font-size:18px;font-weight:600;margin-bottom:4px}
.incoming-card .caller-label{font-size:13px;color:var(--text-light);margin-bottom:24px}
.incoming-actions{display:flex;gap:20px;justify-content:center}
.incoming-actions button{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;font-size:22px;transition:transform .15s}
.incoming-actions button:hover{transform:scale(1.1)}
.incoming-actions button:active{transform:scale(.9)}
.btn-accept{background:#22c55e;color:#fff}
.btn-reject{background:#ef4444;color:#fff}

.chat-input-area{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);background:#fafbfc;align-items:center}
.chat-input-area input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;outline:none;background:#fff;transition:border .2s;min-width:0}
.chat-input-area input:focus{border-color:var(--primary)}
.btn-icon{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s}
.btn-icon:hover{transform:scale(1.08)}.btn-icon:active{transform:scale(.92)}
.btn-img{background:#e0e7ff;color:var(--primary)}
.btn-voice{background:#fce7f3;color:#ec4899;transition:all .2s}
.btn-voice.recording{background:#ef4444;color:#fff;transform:scale(1.2);animation:rec-pulse .6s infinite}
.btn-video{background:#dcfce7;color:#166534}
.btn-video.in-call{background:#ef4444;color:#fff}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
.btn-send{width:40px;height:40px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.btn-send:hover{transform:scale(1.06)}.btn-send:active{transform:scale(.94)}
.recording-tip{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,.9);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10;white-space:nowrap}
.recording-tip.show{opacity:1}
@media(max-width:500px){.btn-icon{width:34px;height:34px;font-size:16px}.btn-send{width:36px;height:36px;font-size:15px}.user-list-card{width:94%;max-width:340px}}
</style>
</head>
<body>

<div class="join-panel" id="joinPanel">
 <div class="join-card">
  <div class="logo">💬</div><h1>即时聊天</h1>
  <p class="subtitle">位置共享 · 聊天 · 发图 · 语音 · 视频</p>
  <label for="roomInput">房间码</label>
  <input type="text" id="roomInput" placeholder="输入房间码，如 2024" maxlength="20" autocomplete="off">
  <label for="nicknameInput">你的昵称</label>
  <input type="text" id="nicknameInput" placeholder="输入昵称" maxlength="12" autocomplete="off">
  <div class="status-msg" id="statusMsg"></div>
  <button class="btn-join" id="btnJoin">进入房间</button>
 </div>
</div>

<div class="main-app" id="mainApp">
 <div class="topbar">
  <div class="room-info">
   <span class="room-badge" id="roomBadge"># ---</span>
   <button class="btn-online" id="btnOnline" title="在线成员（点击查看）">
    <span class="dot"></span><span id="onlineCount">1</span>人在线
   </button>
   <span class="loc-indicator" id="locIndicator"><span class="loc-dot"></span>定位中...</span>
  </div>
  <button class="btn-leave" id="btnLeave">离开</button>
 </div>
 <div class="chat-section">
  <div class="chat-messages" id="chatMessages"><div class="msg-system">欢迎</div></div>
  <div class="recording-tip" id="recordingTip">🎤 录音中，松开发送...</div>
  <div class="chat-input-area">
   <button class="btn-icon btn-img" id="btnImg" title="发图片">🖼</button>
   <button class="btn-icon btn-voice" id="btnVoice" title="按住录音">🎤</button>
   <button class="btn-icon btn-video" id="btnVideo" title="视频通话">📹</button>
   <input type="text" id="msgInput" placeholder="输入消息..." maxlength="500" autocomplete="off">
   <button class="btn-send" id="btnSend">➤</button>
  </div>
 </div>
</div>

<!-- 在线人员列表 -->
<div class="user-list-overlay" id="userListOverlay">
 <div class="user-list-card">
  <div class="header"><h3>在线成员</h3><button class="close-btn" id="btnCloseUserList">✕</button></div>
  <div class="user-list-body" id="userListBody"></div>
 </div>
</div>

<!-- 图片查看器 -->
<div class="img-viewer" id="imgViewer">
 <button class="btn-close-viewer" id="btnCloseViewer">✕</button>
 <img src="" alt="查看" id="viewerImg">
</div>

<!-- 来电提示 -->
<div class="incoming-overlay" id="incomingOverlay">
 <div class="incoming-card">
  <div class="caller-avatar" id="incomingAvatar"></div>
  <div class="caller-name" id="incomingName"></div>
  <div class="caller-label">视频通话邀请</div>
  <div class="incoming-actions">
   <button class="btn-reject" id="btnRejectCall">✕</button>
   <button class="btn-accept" id="btnAcceptCall">📹</button>
  </div>
 </div>
</div>

<!-- 视频通话界面 -->
<div class="call-overlay" id="callOverlay">
 <div class="call-remote-video" id="callRemoteVideo">
  <div class="caller-name" id="callRemoteName"></div>
  <div class="call-status" id="callStatus">正在连接...</div>
 </div>
 <div class="call-self-video" id="callSelfVideo"></div>
 <div class="call-controls">
  <button class="call-btn call-btn-mute" id="btnMute" title="静音">🎙</button>
  <button class="call-btn call-btn-hangup" id="btnHangup" title="挂断">📞</button>
  <button class="call-btn call-btn-camera" id="btnCamera" title="关摄像头">📷</button>
  <button class="call-btn call-btn-switch" id="btnSwitchCam" title="切换摄像头">🔄</button>
 </div>
</div>

<script src="https://unpkg.com/mqtt@4.3.8/dist/mqtt.min.js"></script>
<script>
(function(){
'use strict';
const $=s=>document.querySelector(s);
const AVATAR_COLORS=['#6366f1','#f97316','#22c55e','#ec4899','#8b5cf6','#06b6d4','#f43f5e','#eab308'];
const PC_CONFIG={iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']},{urls:'stun:stun.miwifi.com:3478'},{urls:'stun:stun.cloudflare.com:3478'}],iceTransportPolicy:'all'};
const CALL_TIMEOUT=35000;
const ICE_CONNECT_TIMEOUT=20000;

const S={
  mqtt:null,roomCode:'',nickname:'',userId:'',myPosition:null,onlineUsers:{},
  positionWatchId:null,msgSeq:0,seenMsgIds:new Set(),
  recording:false,mediaRecorder:null,audioChunks:[],
  recordingStartTime:0,_voiceTimer:null,_posInterval:null,
  // 视频通话状态
  callState:'idle',
  callPeerId:'',callPeerName:'',callTimer:null,_callStream:null,_pc:null,
  _muted:false,_cameraOff:false,_iceCache:[],_iceTimer:null,_callRetryTimer:null,_audioOk:true
};
S.userId='u_'+Math.random().toString(36).substr(2,9)+Date.now().toString(36);

const joinPanel=$('#joinPanel'),mainApp=$('#mainApp'),roomBadge=$('#roomBadge');
const btnOnline=$('#btnOnline'),onlineCount=$('#onlineCount'),locIndicator=$('#locIndicator');
const chatMessages=$('#chatMessages'),msgInput=$('#msgInput');
const btnJoin=$('#btnJoin'),btnLeave=$('#btnLeave'),btnSend=$('#btnSend');
const roomInput=$('#roomInput'),nicknameInput=$('#nicknameInput'),statusMsg=$('#statusMsg');
const btnImg=$('#btnImg'),btnVoice=$('#btnVoice'),btnVideo=$('#btnVideo'),recordingTip=$('#recordingTip');
const imgViewer=$('#imgViewer'),viewerImg=$('#viewerImg'),btnCloseViewer=$('#btnCloseViewer');
const userListOverlay=$('#userListOverlay'),userListBody=$('#userListBody'),btnCloseUserList=$('#btnCloseUserList');
const incomingOverlay=$('#incomingOverlay'),incomingAvatar=$('#incomingAvatar'),incomingName=$('#incomingName');
const btnAcceptCall=$('#btnAcceptCall'),btnRejectCall=$('#btnRejectCall');
const callOverlay=$('#callOverlay'),callRemoteVideo=$('#callRemoteVideo'),callRemoteName=$('#callRemoteName');
const callStatus=$('#callStatus'),callSelfVideo=$('#callSelfVideo');
const btnHangup=$('#btnHangup'),btnMute=$('#btnMute'),btnCamera=$('#btnCamera'),btnSwitchCam=$('#btnSwitchCam');
const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='image/*';fileInput.style.display='none';document.body.appendChild(fileInput);

function fmtTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function scrollChat(){chatMessages.scrollTop=chatMessages.scrollHeight}
function genMsgId(){return S.userId+'_'+(S.msgSeq++)+'_'+Date.now()}
function avatarColor(uid){let h=0;for(let i=0;i<uid.length;i++)h=((h<<5)-h)+uid.charCodeAt(i);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]}
function base64ToBlob(base64){const parts=base64.split(',');const mime=parts[0].match(/:(.*?);/)[1];const raw=atob(parts[1]);const u8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);return new Blob([u8],{type:mime})}

// 距离计算 (Haversine)
function calcDist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  if(d<1)return Math.round(d*1000)+'m';
  return d.toFixed(1)+'km';
}

function refreshUserList(){
  userListBody.innerHTML='';
  const uids=Object.keys(S.onlineUsers);
  if(!uids.includes(S.userId))uids.unshift(S.userId);
  const items=[];uids.forEach(uid=>{const u=S.onlineUsers[uid],isMe=uid===S.userId;const nick=isMe?S.nickname:(u?.nickname||'未知');const pos=u?.position;items.push({uid,nick,isMe,pos,color:avatarColor(uid)})});
  items.sort((a,b)=>b.isMe-a.isMe);
  items.forEach(it=>{
    const div=document.createElement('div');div.className='user-item';
    const avatar='<div class="avatar" style="background:'+it.color+'">'+it.nick[0]+'</div>';
    const name='<span class="name">'+it.nick+'</span>';
    let info='';
    if(it.pos){
      const lat=it.pos.lat.toFixed(4),lng=it.pos.lng.toFixed(4);
      let dist='';
      if(S.myPosition&&!it.isMe){dist=' <span class="dist">距你 '+calcDist(S.myPosition.lat,S.myPosition.lng,it.pos.lat,it.pos.lng)+'</span>'}
      info='<div class="loc-info"><span class="coords">📍 '+lat+', '+lng+'</span>'+dist+'</div>';
    }else if(!it.isMe||!S.myPosition){
      info='<div class="loc-info"><span class="coords">未定位</span></div>';
    }else{
      const lat=S.myPosition.lat.toFixed(4),lng=S.myPosition.lng.toFixed(4);
      info='<div class="loc-info"><span class="coords">📍 '+lat+', '+lng+'</span></div>';
    }
    let btns='';
    if(it.isMe)btns='<span class="me-tag">我</span>';
    else{
      const busy=S.callState!=='idle';
      btns='<button class="btn-call" onclick="window._startCall(\''+it.uid+'\',\''+it.nick.replace(/'/g,"\\'")+'\')" title="视频通话"'+(busy?' disabled style="opacity:.3"':'')+'>📹</button>';
    }
    div.innerHTML=avatar+name+btns+info;
    userListBody.appendChild(div);
  });
}

async function startVideoCall(targetUid,targetName){
  if(S.callState!=='idle')return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){statusMsg.textContent='当前环境不支持摄像头（需HTTPS）';setTimeout(()=>statusMsg.textContent='',3000);return}
  if(location.protocol==='http:'&&location.hostname!=='localhost'){statusMsg.textContent='视频通话需要HTTPS，请用https://访问';setTimeout(()=>statusMsg.textContent='',3000);return}
  if(!S.onlineUsers[targetUid]){statusMsg.textContent='对方已离线';setTimeout(()=>statusMsg.textContent='',2000);return}
  let audioOk=true;
  try{S._callStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:true})}
  catch(e){
    try{S._callStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});audioOk=false}
    catch(e2){statusMsg.textContent='摄像头权限被拒或设备不可用';setTimeout(()=>statusMsg.textContent='',3000);return}
  }
  S.callState='calling';S.callPeerId=targetUid;S.callPeerName=targetName;S._muted=false;S._cameraOff=false;S._audioOk=audioOk;
  sendWebRTC({type:'call_request',to:targetUid,nick:S.nickname,audio:audioOk});
  S._callRetryTimer=setTimeout(()=>{if(S.callState==='calling')sendWebRTC({type:'call_request',to:targetUid,nick:S.nickname,audio:audioOk,retry:true})},1500);
  callStatus.textContent='正在呼叫 '+targetName+'...';callStatus.classList.add('show');
  callRemoteName.textContent=targetName;callOverlay.classList.add('open');
  showSelfVideo();btnVideo.classList.add('in-call');
  S.callTimer=setTimeout(()=>{if(S.callState==='calling'){endCall('对方无应答');sendWebRTC({type:'call_cancel',to:targetUid})}},CALL_TIMEOUT);
}
window._startCall=startVideoCall;

async function acceptCall(fromUid,fromName){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){sendWebRTC({type:'call_reject',to:fromUid,reason:'no_media'});incomingOverlay.classList.remove('open');statusMsg.textContent='当前环境不支持摄像头（需HTTPS）';setTimeout(()=>statusMsg.textContent='',3000);return}
  let audioOk=true;
  try{S._callStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:true})}
  catch(e){
    try{S._callStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});audioOk=false}
    catch(e2){sendWebRTC({type:'call_reject',to:fromUid,reason:'no_media'});incomingOverlay.classList.remove('open');statusMsg.textContent='摄像头权限被拒';setTimeout(()=>statusMsg.textContent='',3000);return}
  }
  S.callState='connected';S.callPeerId=fromUid;S.callPeerName=fromName;S._muted=false;S._cameraOff=false;S._audioOk=audioOk;
  incomingOverlay.classList.remove('open');
  callRemoteName.textContent=fromName;callStatus.textContent='连接中...';callStatus.classList.add('show');
  callOverlay.classList.add('open');showSelfVideo();btnVideo.classList.add('in-call');
  sendWebRTC({type:'call_accept',to:fromUid});
  await createPeerConnection();
}

async function createPeerConnection(){
  S._pc=new RTCPeerConnection(PC_CONFIG);
  S._iceCache=[];
  S._pc.onicecandidate=e=>{if(e.candidate)sendWebRTC({type:'ice',to:S.callPeerId,ice:e.candidate})};
  S._pc.ontrack=e=>{
    callStatus.classList.remove('show');
    const track=e.track;
    if(track.kind==='video'){
      callRemoteVideo.querySelectorAll('video').forEach(v=>v.remove());
      const vid=document.createElement('video');
      vid.autoplay=true;vid.playsInline=true;vid.muted=true;
      vid.srcObject=new MediaStream([track]);
      callRemoteVideo.appendChild(vid);
      vid.play().then(()=>{vid.muted=false}).catch(()=>{});
    }else if(track.kind==='audio'){
      callRemoteVideo.querySelectorAll('audio').forEach(a=>a.remove());
      const audio=document.createElement('audio');
      audio.autoplay=true;audio.style.display='none';
      audio.srcObject=new MediaStream([track]);
      callRemoteVideo.appendChild(audio);
      audio.play().catch(()=>{});
    }
  };
  let connected=false;
  S._pc.oniceconnectionstatechange=()=>{
    if(!S._pc)return;
    const s=S._pc.iceConnectionState;
    if(s==='connected'||s==='completed'){
      connected=true;
      callStatus.classList.remove('show');
      if(S._iceTimer){clearTimeout(S._iceTimer);S._iceTimer=null}
    }
    if(s==='failed'||s==='closed')endCall('连接失败');
  };
  S._pc.onconnectionstatechange=()=>{
    if(!S._pc)return;
    const cs=S._pc.connectionState;
    if(cs==='connected')callStatus.classList.remove('show');
    if(cs==='failed'&&S._pc.iceConnectionState!=='connected')endCall('连接失败');
  };
  S._callStream.getTracks().forEach(t=>S._pc.addTrack(t,S._callStream));
  S._iceTimer=setTimeout(()=>{if(!connected)endCall('连接超时，请检查网络')},ICE_CONNECT_TIMEOUT);
}
function showSelfVideo(){
  callSelfVideo.querySelectorAll('video').forEach(v=>v.remove());
  const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;vid.muted=true;vid.srcObject=S._callStream;
  callSelfVideo.appendChild(vid);
}
function flushIceCache(){
  if(!S._pc||!S._iceCache.length)return;
  S._iceCache.forEach(c=>S._pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}));
  S._iceCache=[];
}
async function handleSDP(data){
  if(!S._pc)await createPeerConnection();
  await S._pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
  flushIceCache();
  if(data.sdp.type==='offer'){const answer=await S._pc.createAnswer();await S._pc.setLocalDescription(answer);sendWebRTC({type:'sdp',to:data.from,sdp:answer})}
}
function handleICE(data){
  if(!S._pc)return;
  S._pc.addIceCandidate(new RTCIceCandidate(data.ice)).catch(()=>{S._iceCache.push(data.ice)});
}

function endCall(reason){
  if(S.callTimer){clearTimeout(S.callTimer);S.callTimer=null}
  if(S._iceTimer){clearTimeout(S._iceTimer);S._iceTimer=null}
  if(S._callRetryTimer){clearTimeout(S._callRetryTimer);S._callRetryTimer=null}
  S._iceCache=[];
  const wasCalling=S.callState==='calling'||S.callState==='connected'||S.callState==='ringing';
  S.callState='idle';
  if(S._pc){S._pc.close();S._pc=null}
  if(S._callStream){S._callStream.getTracks().forEach(t=>t.stop());S._callStream=null}
  callOverlay.classList.remove('open');incomingOverlay.classList.remove('open');btnVideo.classList.remove('in-call');
  callRemoteVideo.querySelectorAll('video,audio').forEach(v=>v.remove());
  callSelfVideo.querySelectorAll('video').forEach(v=>v.remove());
  callStatus.classList.remove('show');
  if(wasCalling&&reason){statusMsg.textContent=reason;setTimeout(()=>statusMsg.textContent='',2000)}
}

function handleWebRTC(data){
  if(data.from===S.userId)return;
  switch(data.type){
    case 'call_request':
      if(data.to!==S.userId)return;
      if(S.callState!=='idle'){
        if(data.from===S.callPeerId&&S.callState==='ringing'&&data.retry)return;
        if(S.callPeerId&&!S.onlineUsers[S.callPeerId])endCall();
        if(S.callState!=='idle'){sendWebRTC({type:'call_reject',to:data.from,reason:'busy'});return}
      }
      S.callState='ringing';S.callPeerId=data.from;S.callPeerName=data.nick||'未知';
      incomingAvatar.style.background=avatarColor(data.from);incomingAvatar.textContent=(data.nick||'?')[0];incomingName.textContent=data.nick||'未知';
      incomingOverlay.classList.add('open');
      S.callTimer=setTimeout(()=>{if(S.callState==='ringing'){endCall('未接听');sendWebRTC({type:'call_timeout',to:data.from})}},CALL_TIMEOUT);
      break;
    case 'call_accept':
      if(S.callState==='calling'&&data.to===S.userId){if(S.callTimer){clearTimeout(S.callTimer);S.callTimer=null}S.callState='connected';callStatus.textContent='连接中...';createPeerConnection().then(()=>S._pc.createOffer()).then(o=>S._pc.setLocalDescription(o)).then(()=>sendWebRTC({type:'sdp',to:data.from,sdp:S._pc.localDescription})).catch(()=>endCall('连接失败'))}
      break;
    case 'call_reject':case 'call_timeout':case 'call_cancel':
      if(data.to===S.userId){const r=data.type==='call_reject'?'对方拒绝了':data.type==='call_timeout'?'对方未接听':'对方取消了';endCall(r)}
      break;
    case 'sdp':if(data.to===S.userId&&S.callState==='connected')handleSDP(data).catch(()=>endCall('连接失败'));break;
    case 'ice':if(data.to===S.userId&&S.callState==='connected')handleICE(data);break;
    case 'call_end':if(data.to===S.userId)endCall('对方挂断了');break;
  }
}

// ===== MQTT =====
function connectMQTT(){
  statusMsg.textContent='连接中...';
  const will=JSON.stringify({t:'leave',uid:S.userId,nick:S.nickname,ts:Date.now()});
  S.mqtt=mqtt.connect('wss://broker.emqx.io:8084/mqtt',{
    clientId:S.userId,clean:true,connectTimeout:10000,reconnectPeriod:3000,
    will:{topic:'mapchat/'+S.roomCode+'/event',payload:will,qos:1,retain:false}
  });
  S.mqtt.on('connect',()=>{
    statusMsg.textContent='';
    ['position','chat','event','webrtc'].forEach(t=>S.mqtt.subscribe('mapchat/'+S.roomCode+'/'+t));
    enterRoom();
    S.mqtt.publish('mapchat/'+S.roomCode+'/event',JSON.stringify({t:'join',uid:S.userId,nick:S.nickname,ts:Date.now()}));
    requestAllPositions();
  });
  S.mqtt.on('message',(topic,payload)=>{
    try{const d=JSON.parse(payload.toString());const tp=topic.split('/').pop();
      if(tp==='position')handlePosition(d);else if(tp==='chat')handleChat(d);else if(tp==='event')handleEvent(d);else if(tp==='webrtc')handleWebRTC(d);
    }catch(e){}
  });
  S.mqtt.on('error',()=>{statusMsg.textContent='连接失败'});
  S.mqtt.on('close',()=>{if(!S._leaving)statusMsg.textContent='断开，重连中...'});
  S.mqtt.on('reconnect',()=>{['position','chat','event','webrtc'].forEach(t=>S.mqtt.subscribe('mapchat/'+S.roomCode+'/'+t));requestAllPositions()});
}
function requestAllPositions(){S.mqtt.publish('mapchat/'+S.roomCode+'/event',JSON.stringify({t:'req_pos',uid:S.userId,ts:Date.now()}))}
function sendMyPosition(){if(!S.myPosition||!S.mqtt||!S.mqtt.connected)return;S.mqtt.publish('mapchat/'+S.roomCode+'/position',JSON.stringify({uid:S.userId,nick:S.nickname,pos:S.myPosition,ts:Date.now(),mid:genMsgId()}))}
function handlePosition(data){if(data.uid===S.userId)return;const u=S.onlineUsers[data.uid];if(u){u.position=data.pos;u.lastSeen=Date.now();u.nickname=data.nick||u.nickname}else S.onlineUsers[data.uid]={nickname:data.nick||'未知',position:data.pos,lastSeen:Date.now()};updateOnlineCount()}
function handleChat(data){const key=data.mid||(data.uid+'_'+data.ts);if(data.uid===S.userId||S.seenMsgIds.has(key))return;S.seenMsgIds.add(key);if(S.seenMsgIds.size>800)S.seenMsgIds.clear();addMessage({type:data.type||'text',userId:data.uid,nickname:data.nick,text:data.txt,img:data.img,audio:data.audio,video:data.video,duration:data.duration,timestamp:data.ts})}
function handleEvent(data){if(data.t==='req_pos'){if(data.uid!==S.userId&&S.myPosition)sendMyPosition();return}if(data.uid===S.userId)return;if(data.t==='join'){if(!S.onlineUsers[data.uid]){S.onlineUsers[data.uid]={nickname:data.nick,position:null,lastSeen:Date.now()};addMessage({type:'system',text:data.nick+' 加入了房间'});updateOnlineCount()}if(S.myPosition)sendMyPosition()}else if(data.t==='leave'){addMessage({type:'system',text:(S.onlineUsers[data.uid]?.nickname||data.nick||'某人')+' 离开了房间'});delete S.onlineUsers[data.uid];updateOnlineCount()}}

function addMessage(msg){const div=document.createElement('div');if(msg.type==='system'){div.className='msg-system';div.textContent=msg.text}else{const isSelf=msg.userId===S.userId;div.className='msg-row '+(isSelf?'self':'other');const b=document.createElement('div');if(msg.type==='image'){b.className='msg-bubble image-bubble';const img=document.createElement('img');img.className='msg-image';img.src=msg.img;img.alt='图片';img.loading='lazy';img.addEventListener('click',()=>{viewerImg.src=msg.img;imgViewer.classList.add('open')});b.appendChild(img)}else if(msg.type==='video'){b.className='msg-bubble video-bubble';const vid=document.createElement('video');vid.className='msg-video';vid.src=msg.video;vid.controls=true;vid.playsInline=true;vid.preload='metadata';b.appendChild(vid)}else if(msg.type==='voice'){b.className='msg-bubble';const v=document.createElement('div');v.className='voice-msg';const playBtn=document.createElement('button');playBtn.className='btn-play-voice';playBtn.textContent='▶';const wave=document.createElement('div');wave.className='voice-wave';for(let i=0;i<8;i++){const bar=document.createElement('div');bar.className='bar';bar.style.height=(6+Math.random()*18)+'px';wave.appendChild(bar)}const dur=document.createElement('span');dur.className='voice-duration';dur.textContent=msg.duration+'s';v.appendChild(playBtn);v.appendChild(wave);v.appendChild(dur);b.appendChild(v);const blob=base64ToBlob(msg.audio);const blobUrl=URL.createObjectURL(blob);const audio=new Audio(blobUrl);audio.preload='auto';let playing=false;const waveBars=wave.querySelectorAll('.bar');let animId;function animateWave(){waveBars.forEach(b2=>{b2.style.height=(4+Math.random()*20)+'px'});animId=requestAnimationFrame(animateWave)}function stopWave(){if(animId){cancelAnimationFrame(animId);animId=null}}playBtn.addEventListener('click',()=>{if(playing){audio.pause();audio.currentTime=0;playBtn.textContent='▶';playBtn.classList.remove('playing');stopWave();playing=false}else{audio.play().then(()=>{playBtn.textContent='⏸';playBtn.classList.add('playing');animateWave()}).catch(()=>{});audio.onended=()=>{playBtn.textContent='▶';playBtn.classList.remove('playing');stopWave();playing=false};audio.onerror=()=>{playBtn.textContent='⚠';playBtn.classList.remove('playing');stopWave();playing=false};playing=true}})}else{b.className='msg-bubble';if(!isSelf){const n=document.createElement('div');n.className='msg-nickname';n.textContent=msg.nickname||'未知';b.appendChild(n)}const t=document.createElement('span');t.textContent=msg.text;b.appendChild(t)}const tm=document.createElement('div');tm.className='msg-time';tm.textContent=fmtTime(msg.timestamp);b.appendChild(tm);div.appendChild(b)}chatMessages.appendChild(div);scrollChat()}
function sendMessage(){const text=msgInput.value.trim();if(!text||!S.mqtt||!S.mqtt.connected)return;const msg={type:'text',uid:S.userId,nick:S.nickname,txt:text,ts:Date.now(),mid:genMsgId()};S.seenMsgIds.add(msg.mid);addMessage({type:'text',userId:S.userId,nickname:S.nickname,text:text,timestamp:msg.ts});S.mqtt.publish('mapchat/'+S.roomCode+'/chat',JSON.stringify(msg));msgInput.value='';msgInput.focus()}

function compressImage(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;const maxW=600;if(w>maxW){h=h*maxW/w;w=maxW}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);let q=0.55;let result=c.toDataURL('image/jpeg',q);if(result.length>400000){q=0.3;result=c.toDataURL('image/jpeg',q)}if(result.length>600000){reject(new Error('图片过大'));return}resolve(result)};img.onerror=()=>reject(new Error('加载失败'));img.src=e.target.result};reader.onerror=()=>reject(new Error('读取失败'));reader.readAsDataURL(file)})}
btnImg.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',async()=>{const file=fileInput.files[0];if(!file)return;try{statusMsg.textContent='压缩中...';const base64=await compressImage(file);statusMsg.textContent='';const msg={type:'image',uid:S.userId,nick:S.nickname,img:base64,ts:Date.now(),mid:genMsgId()};S.seenMsgIds.add(msg.mid);addMessage({type:'image',userId:S.userId,nickname:S.nickname,img:base64,timestamp:msg.ts});S.mqtt.publish('mapchat/'+S.roomCode+'/chat',JSON.stringify(msg))}catch(e){statusMsg.textContent=e.message;setTimeout(()=>statusMsg.textContent='',2500)}fileInput.value=''});

const VOICE_MIMES=['audio/webm;codecs=opus','audio/mp4','audio/webm','audio/aac','audio/ogg;codecs=opus'];
let _cachedStream=null,_cachedRecorder=null;
async function prepareRecorder(){if(_cachedRecorder&&_cachedRecorder.state!=='inactive')return _cachedRecorder;if(!_cachedStream){try{_cachedStream=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){throw new Error('无法访问麦克风')}}for(const mime of VOICE_MIMES){if(MediaRecorder.isTypeSupported(mime)){try{_cachedRecorder=new MediaRecorder(_cachedStream,{mimeType:mime});return _cachedRecorder}catch(e){continue}}}_cachedRecorder=new MediaRecorder(_cachedStream);return _cachedRecorder}
async function startRecording(){if(S.recording||S.callState!=='idle')return;S.recording=true;try{const rec=await prepareRecorder();S.mediaRecorder=rec;S.audioChunks=[];S.recordingStartTime=Date.now();rec.ondataavailable=e=>{if(e.data.size>0)S.audioChunks.push(e.data)};rec.onstop=()=>{const blob=new Blob(S.audioChunks,{type:rec.mimeType||'audio/webm'});const reader=new FileReader();reader.onload=()=>{const base64=reader.result;if(base64.length>700000){statusMsg.textContent='语音过长';setTimeout(()=>statusMsg.textContent='',2500);resetVoiceUI();return}const duration=Math.round((Date.now()-S.recordingStartTime)/1000)||1;const msg={type:'voice',uid:S.userId,nick:S.nickname,audio:base64,duration:duration,ts:Date.now(),mid:genMsgId()};S.seenMsgIds.add(msg.mid);addMessage({type:'voice',userId:S.userId,nickname:S.nickname,audio:base64,duration:duration,timestamp:msg.ts});S.mqtt.publish('mapchat/'+S.roomCode+'/chat',JSON.stringify(msg));resetVoiceUI()};reader.readAsDataURL(blob)};rec.start();btnVoice.classList.add('recording');btnVoice.textContent='●';recordingTip.classList.add('show');S._voiceTimer=setInterval(()=>{const elapsed=Math.round((Date.now()-S.recordingStartTime)/1000);recordingTip.textContent='🎤 '+elapsed+'s ... 松开发送';if(elapsed>=25)stopRecording()},500)}catch(e){resetVoiceUI();statusMsg.textContent=e.message||'录音失败';setTimeout(()=>statusMsg.textContent='',3000)}}
function resetVoiceUI(){S.recording=false;btnVoice.classList.remove('recording');btnVoice.textContent='🎤';recordingTip.classList.remove('show');if(S._voiceTimer){clearInterval(S._voiceTimer);S._voiceTimer=null}}
function stopRecording(){if(!S.recording||!S.mediaRecorder||S.mediaRecorder.state==='inactive')return;try{S.mediaRecorder.stop()}catch(e){}if(S._voiceTimer){clearInterval(S._voiceTimer);S._voiceTimer=null}}
btnVoice.addEventListener('pointerdown',e=>{e.preventDefault();startRecording()});btnVoice.addEventListener('pointerup',e=>{e.preventDefault();stopRecording()});btnVoice.addEventListener('pointerleave',e=>{if(S.recording)stopRecording()});btnVoice.addEventListener('pointercancel',e=>{if(S.recording)stopRecording()});btnVoice.addEventListener('touchstart',e=>{e.preventDefault();startRecording()});btnVoice.addEventListener('touchend',e=>{e.preventDefault();stopRecording()});btnVoice.addEventListener('touchcancel',e=>{if(S.recording)stopRecording()});

// ===== 视频通话按钮 =====
btnVideo.addEventListener('click',()=>{if(S.callState!=='idle'){endCall();return}btnOnline.click()});

// ===== 图片查看器 =====
btnCloseViewer.addEventListener('click',()=>imgViewer.classList.remove('open'));imgViewer.addEventListener('click',e=>{if(e.target===imgViewer)imgViewer.classList.remove('open')});

// ===== 在线人员列表 =====
btnOnline.addEventListener('click',()=>{refreshUserList();userListOverlay.classList.add('open')});btnCloseUserList.addEventListener('click',()=>userListOverlay.classList.remove('open'));userListOverlay.addEventListener('click',e=>{if(e.target===userListOverlay)userListOverlay.classList.remove('open')});

// ===== 在线人数 =====
function updateOnlineCount(){let count=1;const now=Date.now();Object.entries(S.onlineUsers).forEach(([_,u])=>{if(now-u.lastSeen<120000)count++});onlineCount.textContent=count;btnOnline.title='在线成员（点击查看详情）'}setInterval(updateOnlineCount,8000);

// ===== GPS =====
function startGPSWatch(){if(!navigator.geolocation){locIndicator.innerHTML='<span class="loc-dot" style="color:#ef4444"></span>不支持';return}navigator.geolocation.getCurrentPosition(pos=>{onGPSPosition(pos);watchLoop()},err=>{watchLoop()},{enableHighAccuracy:false,timeout:5000,maximumAge:60000});function watchLoop(){if(S.positionWatchId!==null)navigator.geolocation.clearWatch(S.positionWatchId);S.positionWatchId=navigator.geolocation.watchPosition(onGPSPosition,onGPSError,{enableHighAccuracy:true,timeout:15000,maximumAge:5000})}}
function onGPSPosition(pos){S.myPosition={lat:pos.coords.latitude,lng:pos.coords.longitude};locIndicator.innerHTML='<span class="loc-dot"></span>已定位 (GPS)';locIndicator.className='loc-indicator active';if(!S.onlineUsers[S.userId])S.onlineUsers[S.userId]={nickname:S.nickname,position:S.myPosition,lastSeen:Date.now()};else{S.onlineUsers[S.userId].position=S.myPosition;S.onlineUsers[S.userId].lastSeen=Date.now()}sendMyPosition();refreshUserList()}
function onGPSError(err){if(err.code===err.TIMEOUT){locIndicator.innerHTML='<span class="loc-dot" style="color:#f59e0b"></span>GPS 超时，重试中...';locIndicator.className='loc-indicator'}else if(err.code===err.PERMISSION_DENIED){locIndicator.innerHTML='<span class="loc-dot" style="color:#ef4444"></span>定位权限被拒';locIndicator.className='loc-indicator'}else if(err.code===err.POSITION_UNAVAILABLE){locIndicator.innerHTML='<span class="loc-dot" style="color:#ef4444"></span>位置不可用';locIndicator.className='loc-indicator'}}

// ===== 进入/离开 =====
function enterRoom(){joinPanel.classList.add('hidden');mainApp.classList.add('visible');roomBadge.textContent='#'+S.roomCode;onlineCount.textContent='1';startGPSWatch();chatMessages.innerHTML='<div class="msg-system">房间 #'+S.roomCode+' | 文字/图片/语音/视频</div>';prepareRecorder().catch(()=>{});S._posInterval=setInterval(()=>{if(S.myPosition)sendMyPosition()},15000);setTimeout(()=>autoVideoRecord(),1200)}
function getSupportedVideoMime(){const types=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];for(const t of types){if(MediaRecorder.isTypeSupported(t))return t}return 'video/webm'}
async function autoVideoRecord(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||typeof MediaRecorder==='undefined')return;
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:360},height:{ideal:640},facingMode:'user',aspectRatio:{ideal:9/16}},audio:false})}catch(e){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})}catch(e2){return}}
  const recTip=document.createElement('div');recTip.className='video-rec-tip';recTip.textContent='正在加入';chatMessages.parentElement.appendChild(recTip);
  let previewVideo=null;
  try{
    previewVideo=document.createElement('video');previewVideo.autoplay=true;previewVideo.playsInline=true;previewVideo.muted=true;previewVideo.srcObject=stream;
    await new Promise((resolve,reject)=>{previewVideo.onloadedmetadata=()=>previewVideo.play().then(resolve).catch(reject);setTimeout(()=>reject(new Error('timeout')),5000)});
    await new Promise(r=>setTimeout(r,800));
    const mimeType=getSupportedVideoMime();
    let recorder;
    try{recorder=new MediaRecorder(stream,{mimeType:mimeType,videoBitsPerSecond:300000})}catch(e){recorder=new MediaRecorder(stream,{videoBitsPerSecond:300000})}
    const chunks=[];
    recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    recorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());recTip.remove();
      const blob=new Blob(chunks,{type:recorder.mimeType||'video/webm'});
      const reader=new FileReader();
      reader.onload=()=>{
        const base64=reader.result;
        if(base64.length>700000)return;
        const msg={type:'video',uid:S.userId,nick:S.nickname,video:base64,duration:10,ts:Date.now(),mid:genMsgId()};
        S.seenMsgIds.add(msg.mid);addMessage({type:'video',userId:S.userId,nickname:S.nickname,video:base64,duration:10,timestamp:msg.ts});
        if(S.mqtt&&S.mqtt.connected)S.mqtt.publish('mapchat/'+S.roomCode+'/chat',JSON.stringify(msg));
      };reader.readAsDataURL(blob);
    };
    recorder.start();setTimeout(()=>{if(recorder.state!=='inactive')recorder.stop()},10000);
  }catch(e){recTip.remove();if(stream)stream.getTracks().forEach(t=>t.stop())}
}
function leaveRoom(){S._leaving=true;if(S.callState!=='idle')sendWebRTC({type:'call_end',to:S.callPeerId});endCall();if(S._posInterval){clearInterval(S._posInterval);S._posInterval=null}if(S.recording)stopRecording();if(S.positionWatchId!==null){navigator.geolocation.clearWatch(S.positionWatchId);S.positionWatchId=null}if(_cachedStream){_cachedStream.getTracks().forEach(t=>t.stop());_cachedStream=null;_cachedRecorder=null}if(S.mqtt){S.mqtt.publish('mapchat/'+S.roomCode+'/event',JSON.stringify({t:'leave',uid:S.userId,nick:S.nickname,ts:Date.now()}),{},()=>{S.mqtt.end(true)});setTimeout(()=>{if(S.mqtt&&S.mqtt.connected)S.mqtt.end(true)},800)}S.onlineUsers={};S.myPosition=null;S.seenMsgIds.clear();chatMessages.innerHTML='';joinPanel.classList.remove('hidden');mainApp.classList.remove('visible');S.mqtt=null;S._leaving=false;statusMsg.textContent='';S.callPeerId='';S.callPeerName=''}

btnJoin.addEventListener('click',()=>{const rc=roomInput.value.trim(),nn=nicknameInput.value.trim();if(!rc){statusMsg.textContent='请输入房间码';return}if(!nn){statusMsg.textContent='请输入昵称';return}statusMsg.textContent='';S.roomCode=rc;S.nickname=nn;connectMQTT()});nicknameInput.addEventListener('keydown',e=>{if(e.key==='Enter')btnJoin.click()});btnLeave.addEventListener('click',leaveRoom);btnSend.addEventListener('click',sendMessage);msgInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});
window.addEventListener('beforeunload',()=>{S._leaving=true;if(S.callState!=='idle')endCall();if(S.mqtt)S.mqtt.end(true);if(_cachedStream)_cachedStream.getTracks().forEach(t=>t.stop())});
})();
</script>
